name: jfb

services:
  # Development/testing convenience — in production, point JENKINS_URL to an
  # external Jenkins instance and remove this service entirely.
  jenkins:
    # Workaround: Explicitly set image name to avoid cache collision with the
    # mock-jenkins service (which shares the 'jenkins' service name).
    # pull_policy: build prevents 'docker compose pull' from attempting to
    # fetch this local-only image from Docker Hub.
    image: jfb-jenkins-local
    pull_policy: build
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.jenkins
    container_name: jenkins
    restart: on-failure
    ports:
      - "8080:8080"
    volumes:
      - jenkins-data:/var/jenkins_home
    networks:
      - jenkins

  build-manager:
    build:
      context: ../..
      dockerfile: apps/build-manager/Dockerfile
    container_name: build-manager
    restart: on-failure
    env_file:
      - path: ../env/build-manager.env
        required: false
    environment:
      FILE_MANAGER_URL: http://file-manager:9092
      JENKINS_URL: http://jenkins:8080
    expose:
      - "9010"
    volumes:
      - build-manager-data:/app/data
    depends_on:
      - file-manager
    networks:
      - jenkins

  config-hub:
    build:
      context: ../..
      dockerfile: apps/config-hub/Dockerfile
    container_name: config-hub
    restart: on-failure
    env_file:
      - path: ../env/config-hub.env
        required: false
    ports:
      - "9000:9000"
    environment:
      BOT_CONTROL_URL: http://tg-jenkins-bot:9090
      AGENT_CONTROL_URL: http://agent-control:9091
      FILE_MANAGER_URL: http://file-manager:9092
      BUILD_MANAGER_URL: http://build-manager:9010
    depends_on:
      - tg-jenkins-bot
      - agent-control
      - file-manager
      - build-manager
    networks:
      - jenkins

  tg-jenkins-bot:
    build:
      context: ../..
      dockerfile: apps/tg-jenkins-bot/Dockerfile
    container_name: tg-jenkins-bot
    restart: on-failure
    env_file:
      - path: ../env/tg-jenkins-bot.env
        required: false
    environment:
      BOT_SERVICE_URL: "http://tg-jenkins-bot:9090"
      BUILD_MANAGER_URL: "http://build-manager:9010"
    expose:
      - "9090"
    volumes:
      - bot-data:/app/data
    networks:
      - jenkins

  agent-control:
    platform: linux/amd64
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.flutter-agent
    container_name: agent-control
    restart: on-failure
    env_file:
      - path: ../env/agent-control.env
        required: false
    environment:
      JENKINS_URL: http://jenkins:8080
    expose:
      - "9091"
    volumes:
      - agent-data:/app/data
    networks:
      - jenkins

  file-manager:
    build:
      context: ../..
      dockerfile: apps/file-manager/Dockerfile
    container_name: file-manager
    restart: on-failure
    env_file:
      - path: ../env/file-manager.env
        required: false
    expose:
      - "9092"
    volumes:
      - storage-data:/app/data
    networks:
      - jenkins


  gateway:
    image: caddy:alpine
    container_name: gateway
    restart: on-failure
    volumes:
      - ../gateway/Caddyfile:/etc/caddy/Caddyfile
    expose:
      - "80"
    networks:
      - jenkins

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: on-failure
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    command: tunnel --no-autoupdate run
    depends_on:
      - gateway
    networks:
      - jenkins

volumes:
  jenkins-data:
  bot-data:
  agent-data:
  build-manager-data:
  storage-data:

networks:
  jenkins:
