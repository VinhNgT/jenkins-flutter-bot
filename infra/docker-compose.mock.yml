name: jfb

# Mock override — replaces jenkins + flutter-agent with lightweight mocks.
# Usage: ./compose.sh mock [args]
#
# Configurable environment:
#   MOCK_BUILD_DELAY  — simulated build time in seconds (default: 10)
#   MOCK_FAILURE_RATE — probability of failure, 0.0–1.0 (default: 0)

include:
  - docker-compose.yml

services:
  # Replace real Jenkins with mock
  jenkins:
    # Workaround: Explicitly set image name to avoid cache collision with the
    # real jenkins service (which shares the 'jenkins' service name).
    image: jfb-jenkins-mock
    build:
      context: ..
      dockerfile: apps/mock-jenkins/Dockerfile
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MOCK_BUILD_DELAY: ${MOCK_BUILD_DELAY:-10}
      MOCK_FAILURE_RATE: ${MOCK_FAILURE_RATE:-0}
    volumes: !reset []
    networks:
      - jenkins

  # Replace real agent-control with mock agent-control API
  agent-control:
    image: jfb-agent-control-mock
    platform: !reset ""
    build:
      context: ..
      dockerfile: apps/mock-jenkins/Dockerfile
    container_name: agent-control
    restart: unless-stopped
    command: ["mock-agent"]
    environment:
      JENKINS_URL: http://jenkins:8080
    expose:
      - "9091"
    env_file: !reset []
    volumes:
      - mock-agent-data:/app/data
    networks:
      - jenkins

  # Use log_only storage instead of Google Drive
  file-manager:
    environment:
      STORAGE_BACKEND: log_only

  # Expose bot port for local browser testing of the Telegram Mini App.
  # Injects JFB_DEV_MODE to enable the backend's preview authentication
  # bypass, allowing the tg-emulator.js frontend shim to authenticate
  # with initData="preview" without a real Telegram client.
  tg-jenkins-bot:
    ports:
      - "9090:9090"
    environment:
      JFB_DEV_MODE: "true"

volumes:
  mock-agent-data:
