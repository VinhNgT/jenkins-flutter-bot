[project]
name = "tg-jenkins-bot"
version = "0.0.1"
description = "Telegram bot that triggers Jenkins Flutter builds and uploads APKs to Google Drive"
requires-python = ">=3.12"
dependencies = [
    "python-telegram-bot[ext]>=21.0",
    "httpx>=0.27.0",
    "fastapi>=0.111.0",
    "google-api-python-client>=2.130.0",
    "python-multipart>=0.0.9",
    "python-dotenv>=1.0.0",
    "uvicorn>=0.29.0",
]

[project.scripts]
tg-jenkins-bot = "tg_jenkins_bot.main:cli"

[dependency-groups]
dev = ["mypy>=1.10.0", "ruff>=0.4.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.mypy]

[[tool.mypy.overrides]]
module = ["google_auth_oauthlib.*", "googleapiclient.*"]
ignore_missing_imports = true
