name: jfb

services:
  # Development/testing convenience — in production, point JENKINS_URL to an
  # external Jenkins instance and remove this service entirely.
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jenkins
    restart: on-failure
    ports:
      - "8080:8080"
    volumes:
      - jenkins-data:/var/jenkins_home
    networks:
      - jenkins

  build-manager:
    build:
      context: ..
      dockerfile: apps/build-manager/Dockerfile
    container_name: build-manager
    restart: on-failure
    env_file:
      - path: env/build-manager.env
        required: false
    environment:
      SELF_URL: http://build-manager:9010
      FILE_MANAGER_URL: http://file-manager:9092
    expose:
      - "9010"
    volumes:
      - build-manager-data:/app/data
    depends_on:
      - file-manager
    networks:
      - jenkins

  config-hub:
    build:
      context: ..
      dockerfile: apps/config-hub/Dockerfile
    container_name: config-hub
    restart: on-failure
    env_file:
      - path: env/config-hub.env
        required: false
    ports:
      - "9000:9000"
    environment:
      BOT_CONTROL_URL: http://tg-jenkins-bot:9090
      AGENT_CONTROL_URL: http://agent-control:9091
      FILE_MANAGER_URL: http://file-manager:9092
      BUILD_MANAGER_URL: http://build-manager:9010
    depends_on:
      - tg-jenkins-bot
      - agent-control
      - file-manager
      - build-manager
    networks:
      - jenkins

  tg-jenkins-bot:
    build:
      context: ..
      dockerfile: apps/tg-jenkins-bot/Dockerfile
    container_name: tg-jenkins-bot
    restart: on-failure
    env_file:
      - path: env/tg-jenkins-bot.env
        required: false
    environment:
      BOT_SERVICE_URL: "http://tg-jenkins-bot:9090"
      BUILD_MANAGER_URL: "http://build-manager:9010"
    expose:
      - "9090"
    volumes:
      - bot-data:/app/data
    networks:
      - jenkins

  agent-control:
    platform: linux/amd64
    build:
      context: ..
      dockerfile: infra/Dockerfile.flutter-agent
    container_name: agent-control
    restart: on-failure
    env_file:
      - path: env/agent-control.env
        required: false
    environment:
      JENKINS_URL: http://jenkins:8080
      JENKINS_AGENT_NAME: flutter-agent
      JENKINS_WEB_SOCKET: "true"
    expose:
      - "9091"
    volumes:
      - agent-data:/app/data
    networks:
      - jenkins

  file-manager:
    build:
      context: ..
      dockerfile: apps/file-manager/Dockerfile
    container_name: file-manager
    restart: on-failure
    env_file:
      - path: env/file-manager.env
        required: false
    expose:
      - "9092"
    volumes:
      - storage-data:/app/data
    networks:
      - jenkins

  tg-admin-bot:
    build:
      context: ..
      dockerfile: apps/tg-admin-bot/Dockerfile
    container_name: tg-admin-bot
    restart: on-failure
    env_file:
      - path: env/tg-admin-bot.env
        required: false
    environment:
      ADMIN_BOT_TOKEN: ${ADMIN_BOT_TOKEN:-}
      ADMIN_CHAT_ID: ${ADMIN_CHAT_ID:-}
      CONFIG_HUB_URL: http://config-hub:9000
    depends_on:
      - config-hub
    networks:
      - jenkins

volumes:
  jenkins-data:
  bot-data:
  agent-data:
  build-manager-data:
  storage-data:

networks:
  jenkins:
