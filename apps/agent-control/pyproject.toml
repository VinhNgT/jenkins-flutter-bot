[project]
name = "agent-control"
version = "0.0.1"
description = "HTTP control wrapper for a Jenkins inbound agent process"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.111.0",
    "python-dotenv>=1.0.0",
    "uvicorn>=0.29.0",
]

[project.scripts]
agent-control = "agent_control.main:cli"

[dependency-groups]
dev = ["mypy>=1.10.0", "ruff>=0.4.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
