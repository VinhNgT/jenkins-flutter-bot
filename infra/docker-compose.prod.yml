# Production environment — pulls pre-built images from GHCR instead of building locally.
# Pin a specific release: IMAGE_TAG=v1.2.3 ./compose.sh prod up -d
#
# JFB_DEV_MODE is set to "" to override the "true" inherited from dev compose.
# This enables fail-closed auth, disables Swagger docs, and disables preview mode.

name: jfb

include:
  - docker-compose.yml

services:
  build-manager:
    build: !reset null
    image: ghcr.io/vinhngt/jenkins-flutter-bot/build-manager:${IMAGE_TAG:-latest}
    environment:
      JFB_DEV_MODE: ""

  config-hub:
    build: !reset null
    image: ghcr.io/vinhngt/jenkins-flutter-bot/config-hub:${IMAGE_TAG:-latest}
    environment:
      JFB_DEV_MODE: ""

  tg-jenkins-bot:
    build: !reset null
    image: ghcr.io/vinhngt/jenkins-flutter-bot/tg-jenkins-bot:${IMAGE_TAG:-latest}
    environment:
      JFB_DEV_MODE: ""

  agent-control:
    build: !reset null
    image: ghcr.io/vinhngt/jenkins-flutter-bot/agent-control:${IMAGE_TAG:-latest}
    environment:
      JFB_DEV_MODE: ""

  file-manager:
    build: !reset null
    image: ghcr.io/vinhngt/jenkins-flutter-bot/file-manager:${IMAGE_TAG:-latest}
    environment:
      JFB_DEV_MODE: ""

