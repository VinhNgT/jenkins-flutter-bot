[project]
name = "jenkins-flutter-bot"
version = "0.0.2"
description = "CI/CD ecosystem: Telegram bot + Jenkins + Google Drive"
requires-python = ">=3.12"

[tool.uv]
package = false

[tool.uv.workspace]
members = [
    "apps/*",
    "libs/*",
]

[dependency-groups]
dev = ["mypy>=1.10.0", "ruff>=0.4.0"]

[tool.mypy]

[[tool.mypy.overrides]]
module = ["google_auth_oauthlib.*", "googleapiclient.*"]
ignore_missing_imports = true
