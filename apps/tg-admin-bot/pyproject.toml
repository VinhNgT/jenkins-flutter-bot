[project]
name = "tg-admin-bot"
version = "0.1.1"
description = "Telegram admin bot for managing the Jenkins Flutter Bot stack"
requires-python = ">=3.12"
dependencies = [
    "config-schema",
    "stack-manager",
    "python-telegram-bot[ext]>=21.0",
]

[tool.uv.sources]
config-schema = { workspace = true }
stack-manager = { workspace = true }

[project.scripts]
tg-admin-bot = "tg_admin_bot.main:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
