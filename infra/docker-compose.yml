name: jfb

services:
  # Development/testing convenience — in production, point JENKINS_URL to an
  # external Jenkins instance and remove this service entirely.
  jenkins:
    # Workaround: Explicitly set image name to avoid cache collision with the
    # mock-jenkins service (which shares the 'jenkins' service name).
    # pull_policy: build prevents 'docker compose pull' from attempting to
    # fetch this local-only image from Docker Hub.
    image: jfb-jenkins-local
    pull_policy: build
    build:
      context: ..
      dockerfile: infra/jenkins/Dockerfile
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - jenkins-data:/var/jenkins_home
    networks:
      - jenkins

  build-manager:
    build:
      context: ..
      dockerfile: apps/build-manager/Dockerfile
    container_name: build-manager
    restart: unless-stopped
    env_file:
      - path: compose.env
        required: false
    environment:
      FILE_MANAGER_URL: ${FILE_MANAGER_URL:-http://file-manager:9092}
      JENKINS_URL: ${JENKINS_URL:-http://jenkins:8080}
      AGENT_CONTROL_URL: ${AGENT_CONTROL_URL:-http://agent-control:9091}
    expose:
      - "9010"
    volumes:
      - build-manager-data:/app/data
    depends_on:
      - file-manager
    networks:
      - jenkins

  service-hub:
    build:
      context: ..
      dockerfile: apps/service-hub/Dockerfile
    container_name: service-hub
    restart: unless-stopped
    env_file:
      - path: compose.env
        required: false
    expose:
      - "9000"
    environment:
      AGENT_CONTROL_URL: ${AGENT_CONTROL_URL:-http://agent-control:9091}
      FILE_MANAGER_URL: ${FILE_MANAGER_URL:-http://file-manager:9092}
      BUILD_MANAGER_URL: ${BUILD_MANAGER_URL:-http://build-manager:9010}
    depends_on:
      - agent-control
      - file-manager
      - build-manager
    networks:
      - jenkins

  tg-bot:
    build:
      context: ..
      dockerfile: apps/tg-bot/Dockerfile
    container_name: tg-bot
    restart: unless-stopped
    env_file:
      - path: compose.env
        required: false
    environment:
      BOT_SERVICE_URL: ${BOT_SERVICE_URL:-http://tg-bot:9090}
      BUILD_MANAGER_URL: ${BUILD_MANAGER_URL:-http://build-manager:9010}
      FILE_MANAGER_URL: ${FILE_MANAGER_URL:-http://file-manager:9092}
      SERVICE_HUB_URL: ${SERVICE_HUB_URL:-http://service-hub:9000}
      ENABLE_BROWSER_PREVIEW: ${ENABLE_BROWSER_PREVIEW:-false}
      BROWSER_AUTH_USERNAME: ${BROWSER_AUTH_USERNAME:-}
      BROWSER_AUTH_PASSWORD: ${BROWSER_AUTH_PASSWORD:-}
    expose:
      - "9090"
    volumes:
      - bot-data:/app/data
    depends_on:
      - file-manager
      - service-hub
      - build-manager
    networks:
      - jenkins

  agent-control:
    platform: linux/amd64
    build:
      context: ..
      dockerfile: infra/agent/Dockerfile
    container_name: agent-control
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    env_file:
      - path: compose.env
        required: false
    environment:
      JENKINS_URL: ${JENKINS_URL:-http://jenkins:8080}
    expose:
      - "9091"
    volumes:
      - agent-data:/app/data
    networks:
      - jenkins


  file-manager:
    build:
      context: ..
      dockerfile: apps/file-manager/Dockerfile
    container_name: file-manager
    restart: unless-stopped
    env_file:
      - path: compose.env
        required: false
    expose:
      - "9092"
    volumes:
      - storage-data:/app/data
    networks:
      - jenkins


  gateway:
    build: ./gateway
    container_name: gateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:8880:80"
    volumes:
      - ./gateway/Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - tg-bot
    networks:
      - jenkins

  cloudflared:
    # Note: On Docker for Mac/Linux, you might see a warning about UDP buffer size:
    # "failed to sufficiently increase receive buffer size (was: 208 kiB, wanted: 7168 kiB, got: 416 kiB)"
    # This is a known cosmetic warning for the quic-go library and does not affect tunnel functionality.
    # See: https://github.com/quic-go/quic-go/wiki/UDP-Buffer-Sizes
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    command: tunnel --no-autoupdate run
    depends_on:
      - gateway
    networks:
      - jenkins

volumes:
  jenkins-data:
  bot-data:
  agent-data:
  build-manager-data:
  storage-data:

networks:
  jenkins:
