# Hybrid environment — builds all services locally except agent-control, which is pulled from GHCR.
# Usage: ./compose.sh hybrid [args]

name: jtb

include:
  - docker-compose.yml

services:
  agent-control:
    build: !reset null
    image: ghcr.io/vinhngt/jenkins-flutter-bot/agent-control:${IMAGE_TAG:-edge}
    pull_policy: always
