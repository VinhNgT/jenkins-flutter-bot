<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stack Control — Jenkins Flutter Bot</title>
    <meta
      name="description"
      content="Configuration dashboard for the Jenkins Flutter Bot stack"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main>
      <!-- Header -->
      <div class="header">
        <h1>Stack Control</h1>
        <p>
          Configure the Telegram bot and Jenkins agent, manage secrets, and
          control services.
        </p>
      </div>

      <!-- Service status -->
      <section class="status-grid" id="status-grid"></section>

      <!-- Configuration -->
      <section class="config-grid section">
        <div class="card">
          <button
            class="collapsible-toggle"
            aria-expanded="true"
            type="button"
          >
            Bot Config
          </button>
          <div class="collapsible-body">
            <div class="field">
              <label for="f-bot-token">Telegram bot token</label>
              <input id="f-bot-token" name="bot:telegram.bot_token" />
            </div>
            <div class="field">
              <label for="f-chat-ids">Allowed chat IDs</label>
              <input id="f-chat-ids" name="bot:telegram.allowed_chat_ids" />
            </div>
            <div class="field">
              <label for="f-jenkins-url">Jenkins URL</label>
              <input id="f-jenkins-url" name="bot:jenkins.url" />
            </div>
            <div class="field">
              <label for="f-jenkins-user">Jenkins user</label>
              <input id="f-jenkins-user" name="bot:jenkins.user" />
            </div>
            <div class="field">
              <label for="f-jenkins-token">Jenkins API token</label>
              <input id="f-jenkins-token" name="bot:jenkins.api_token" />
            </div>
            <div class="field">
              <label for="f-job-name">Jenkins job name</label>
              <input id="f-job-name" name="bot:jenkins.job_name" />
            </div>
            <div class="field">
              <label for="f-job-id">Jenkins job ID</label>
              <input id="f-job-id" name="bot:jenkins.job_id" />
            </div>
            <div class="field">
              <label for="f-drive-id">Drive client ID</label>
              <input id="f-drive-id" name="bot:drive.client_id" />
            </div>
            <div class="field">
              <label for="f-drive-secret">Drive client secret</label>
              <input id="f-drive-secret" name="bot:drive.client_secret" />
            </div>
            <div class="field">
              <label for="f-drive-folder">Drive folder name</label>
              <input id="f-drive-folder" name="bot:drive.folder_name" />
            </div>
            <div class="field">
              <label for="f-max-builds"
                >Max recent builds (0 = unlimited)</label
              >
              <input
                id="f-max-builds"
                name="bot:drive.max_recent_builds"
                type="number"
                min="0"
              />
            </div>
            <div class="field">
              <label for="f-callback-host">Bot callback host</label>
              <input id="f-callback-host" name="bot:bot.callback_host" />
            </div>
            <div class="field">
              <label for="f-webhook-port">Bot webhook port</label>
              <input id="f-webhook-port" name="bot:bot.webhook_port" />
            </div>
          </div>
        </div>

        <div class="card">
          <button
            class="collapsible-toggle"
            aria-expanded="true"
            type="button"
          >
            Agent Config
          </button>
          <div class="collapsible-body">
            <div class="field">
              <label for="f-agent-jenkins-url">Jenkins URL</label>
              <input
                id="f-agent-jenkins-url"
                name="agent:jenkins.url"
              />
            </div>
            <div class="field">
              <label for="f-agent-name">Agent name</label>
              <input id="f-agent-name" name="agent:agent.name" />
            </div>
            <div class="field">
              <label for="f-agent-secret">Agent secret</label>
              <input id="f-agent-secret" name="agent:agent.secret" />
            </div>
            <div class="field">
              <label for="f-ws-mode">WebSocket mode</label>
              <select id="f-ws-mode" name="agent:agent.web_socket">
                <option value="true">Enabled (default)</option>
                <option value="false">Disabled (TCP)</option>
              </select>
            </div>
            <div class="field">
              <label for="f-tunnel">Tunnel (TCP only)</label>
              <input
                id="f-tunnel"
                name="agent:agent.tunnel"
                placeholder="host:port"
              />
            </div>
          </div>
        </div>
      </section>

      <!-- Google Drive -->
      <section class="card section">
        <h2>Google Drive</h2>
        <p class="drive-status" id="drive-status">Checking Drive status…</p>
        <div class="button-row">
          <button class="btn-primary" id="drive-start">
            Connect Google Drive
          </button>
        </div>
      </section>

      <!-- Actions -->
      <section class="card section">
        <h2>Actions</h2>
        <div class="button-row" style="margin-bottom: 12px">
          <button class="btn-primary" id="save-config">Save config</button>
          <button class="btn-secondary" id="refresh-all">Refresh</button>
        </div>

        <button
          class="collapsible-toggle log-section"
          aria-expanded="false"
          type="button"
        >
          Last response
        </button>
        <div class="collapsible-body">
          <pre id="log">Ready.</pre>
        </div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
