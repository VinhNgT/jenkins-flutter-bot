name: jfb

services:
  # Development/testing convenience — in production, point JENKINS_URL to an
  # external Jenkins instance and remove this service entirely.
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jenkins
    restart: on-failure
    ports:
      - "8080:8080"
    volumes:
      - jenkins-data:/var/jenkins_home
    networks:
      - jenkins

  config-ui:
    build:
      context: ..
      dockerfile: apps/config-ui/Dockerfile
    container_name: config-ui
    restart: on-failure
    ports:
      - "9000:9000"
    environment:
      BOT_CONTROL_URL: http://tg-bot:9090
      AGENT_CONTROL_URL: http://flutter-agent:9091
      # Both config-ui and tg-bot mount bot-config at /config/bot
      # so oauth.json lands at the same path in both containers.
      BOT_CONFIG_PATH: /config/bot/bot.json
      AGENT_CONFIG_PATH: /config/agent/agent.json
      UI_CONFIG_PATH: /config/ui/ui.json
    volumes:
      - bot-config:/config/bot
      - agent-config:/config/agent
      - ui-config:/config/ui
    depends_on:
      - tg-bot
      - flutter-agent
    networks:
      - jenkins

  tg-bot:
    build:
      context: ..
      dockerfile: apps/tg-jenkins-bot/Dockerfile
    container_name: tg-bot
    restart: on-failure
    environment:
      CONFIG_PATH: /config/bot/bot.json
      BOT_SERVICE_URL: "http://tg-bot:9090"
    expose:
      - "9090"
    volumes:
      # Same mount point as config-ui for bot-config volume
      - bot-config:/config/bot
      - bot-data:/app/data
    networks:
      - jenkins

  flutter-agent:
    platform: linux/amd64
    build:
      context: ..
      dockerfile: infra/Dockerfile.flutter-agent
    container_name: flutter-agent
    restart: on-failure
    environment:
      CONFIG_PATH: /config/agent.json
      JENKINS_URL: http://jenkins:8080
      JENKINS_AGENT_NAME: flutter-agent
      JENKINS_WEB_SOCKET: "true"
    expose:
      - "9091"
    volumes:
      - agent-config:/config
    networks:
      - jenkins

volumes:
  jenkins-data:
  bot-config:
  agent-config:
  ui-config:
  bot-data:

networks:
  jenkins:
