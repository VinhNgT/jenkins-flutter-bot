name: jfb

services:
  # Development/testing convenience — in production, point JENKINS_URL to an
  # external Jenkins instance and remove this service entirely.
  jenkins:
    # Workaround: Explicitly set image name to avoid cache collision with the
    # mock-jenkins service (which shares the 'jenkins' service name).
    # pull_policy: build prevents 'docker compose pull' from attempting to
    # fetch this local-only image from Docker Hub.
    image: jfb-jenkins-local
    pull_policy: build
    build:
      context: ..
      dockerfile: infra/jenkins/Dockerfile
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - jenkins-data:/var/jenkins_home
    networks:
      - jenkins

  build-manager:
    build:
      context: ..
      dockerfile: apps/build-manager/Dockerfile
    container_name: build-manager
    restart: unless-stopped
    env_file:
      - path: compose.env
        required: false
    environment:
      FILE_MANAGER_URL: ${FILE_MANAGER_URL:-http://file-manager:9092}
      JENKINS_URL: ${JENKINS_URL:-http://jenkins:8080}
      AGENT_CONTROL_URL: ${AGENT_CONTROL_URL:-http://agent-control:9091}
      JFB_DEV_MODE: "true"
    expose:
      - "9010"
    volumes:
      - build-manager-data:/app/data
    depends_on:
      - file-manager
    networks:
      - jenkins

  config-hub:
    build:
      context: ..
      dockerfile: apps/config-hub/Dockerfile
    container_name: config-hub
    restart: unless-stopped
    env_file:
      - path: compose.env
        required: false
    expose:
      - "9000"
    environment:
      BOT_CONTROL_URL: ${BOT_CONTROL_URL:-http://tg-jenkins-bot:9090}
      AGENT_CONTROL_URL: ${AGENT_CONTROL_URL:-http://agent-control:9091}
      FILE_MANAGER_URL: ${FILE_MANAGER_URL:-http://file-manager:9092}
      BUILD_MANAGER_URL: ${BUILD_MANAGER_URL:-http://build-manager:9010}
      JFB_DEV_MODE: "true"
    depends_on:
      - tg-jenkins-bot
      - agent-control
      - file-manager
      - build-manager
    networks:
      - jenkins

  tg-jenkins-bot:
    build:
      context: ..
      dockerfile: apps/tg-jenkins-bot/Dockerfile
    container_name: tg-jenkins-bot
    restart: unless-stopped
    env_file:
      - path: compose.env
        required: false
    environment:
      BOT_SERVICE_URL: ${BOT_SERVICE_URL:-http://tg-jenkins-bot:9090}
      BUILD_MANAGER_URL: ${BUILD_MANAGER_URL:-http://build-manager:9010}
      FILE_MANAGER_URL: ${FILE_MANAGER_URL:-http://file-manager:9092}
      JFB_DEV_MODE: "true"
    expose:
      - "9090"
    volumes:
      - bot-data:/app/data
    depends_on:
      - file-manager
    networks:
      - jenkins

  agent-control:
    platform: linux/amd64
    build:
      context: ..
      dockerfile: infra/agent/Dockerfile
    container_name: agent-control
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    env_file:
      - path: compose.env
        required: false
    environment:
      JENKINS_URL: ${JENKINS_URL:-http://jenkins:8080}
      JFB_DEV_MODE: "true"
    expose:
      - "9091"
    volumes:
      - agent-data:/app/data
    networks:
      - jenkins


  file-manager:
    build:
      context: ..
      dockerfile: apps/file-manager/Dockerfile
    container_name: file-manager
    restart: unless-stopped
    env_file:
      - path: compose.env
        required: false
    expose:
      - "9092"
    volumes:
      - storage-data:/app/data
    environment:
      SERVICE_AUTH_TOKEN: ${SERVICE_AUTH_TOKEN:-}
      JFB_DEV_MODE: "true"
    networks:
      - jenkins


  gateway:
    build: ./gateway
    container_name: gateway
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - ./gateway/Caddyfile:/etc/caddy/Caddyfile
    expose:
      - "80"
    networks:
      - jenkins

  cloudflared:
    # Note: On Docker for Mac/Linux, you might see a warning about UDP buffer size:
    # "failed to sufficiently increase receive buffer size (was: 208 kiB, wanted: 7168 kiB, got: 416 kiB)"
    # This is a known cosmetic warning for the quic-go library and does not affect tunnel functionality.
    # See: https://github.com/quic-go/quic-go/wiki/UDP-Buffer-Sizes
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    command: tunnel --no-autoupdate run
    depends_on:
      - gateway
    networks:
      - jenkins

volumes:
  jenkins-data:
  bot-data:
  agent-data:
  build-manager-data:
  storage-data:

networks:
  jenkins:
